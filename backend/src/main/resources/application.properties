spring.application.name=backend
server.port=8080

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rocketdrop_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=RocketDropSecretKeyForJwtSigningNeeds32Chars!
jwt.access-token-expiration-ms=86400000
jwt.refresh-token-expiration-ms=604800000

# CORS
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# Default admin seed credentials (used if account does not exist)
app.seed.admin.email=mohil@rocketdrop.com
app.seed.admin.password=mohil@123

# Upload
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.cloudinary.enabled=true
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}
app.cloudinary.folder=rocketdrop

# Email notifications (optional)
app.email.enabled=false
app.email.from=no-reply@rocketdrop.com
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
logging.level.org.springframework.data.web.config.SpringDataJacksonConfiguration$PageModule$WarningLoggingModifier=ERROR
